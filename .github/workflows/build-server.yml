name: Build Client Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version
        id: get_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-windows-installer:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: with-webui
            backend_only_define: 0
          - variant: backend-only
            backend_only_define: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build Windows binaries
        shell: pwsh
        run: |
          ./scripts/build.ps1 -Arch "amd64" -Version "${{ needs.prepare.outputs.version }}"

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVERSION=${{ needs.prepare.outputs.version }} /DAPP_ARCH=amd64 /DBACKEND_ONLY=${{ matrix.backend_only_define }} scripts\windows_x86_64.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer-amd64-${{ matrix.variant }}
          path: scripts/Output/*_${{ matrix.variant }}_v*.exe

      - name: Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/Output/*_${{ matrix.variant }}_v*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debian-package:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        variant: [with-webui, backend-only]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Build Debian package
        run: |
          chmod +x scripts/build-deb.sh
          if [[ "${{ matrix.variant }}" == "backend-only" ]]; then
            scripts/build-deb.sh --without-webui "${{ matrix.arch }}" "${{ needs.prepare.outputs.version }}"
          else
            scripts/build-deb.sh "${{ matrix.arch }}" "${{ needs.prepare.outputs.version }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: deb-package-${{ matrix.arch }}-${{ matrix.variant }}
          path: release/client/*.deb

      - name: Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/client/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-rpm-package:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        variant: [with-webui, backend-only]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build RPM package
        run: |
          chmod +x scripts/build-rpm.sh
          if [[ "${{ matrix.variant }}" == "backend-only" ]]; then
            scripts/build-rpm.sh --without-webui "${{ matrix.arch }}" "${{ needs.prepare.outputs.version }}"
          else
            scripts/build-rpm.sh "${{ matrix.arch }}" "${{ needs.prepare.outputs.version }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: rpm-package-${{ matrix.arch }}-${{ matrix.variant }}
          path: release/client/*.rpm

      - name: Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/client/*.rpm
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
